<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>www.pizzaria.BellaCrosta.com</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>📋 Cadastro</h1>

  <input type="text" id="cadNome" placeholder="Nome completo">

  <input type="email" id="cadEmail" placeholder="Gmail">

  <input type="tel" id="cadTelefone" placeholder="Telefone">

  <input type="text" id="cadEndereco" placeholder="Endereço">

  <input type="password" id="cadSenha" placeholder="Senha">

  <button onclick="cadastrar()">
    Criar Conta
  </button>

  <p>
    Já possui conta?
    <a href="login.html">
      Entrar
    </a>
  </p>

</div>

<script src="javascript.js"></script>

<div id="toast" style="
  visibility:hidden;
  min-width:250px;
  background:#4caf50;
  color:white;
  text-align:center;
  border-radius:12px;
  padding:16px;
  position:fixed;
  z-index:9999;
  right:20px;
  top:20px;
  font-size:16px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  opacity:0;
  transition:0.5s;
">
</div>

<script>

function mostrarNotificacao(mensagem){

  let toast = document.getElementById("toast");

  toast.innerHTML = mensagem;

  toast.style.visibility = "visible";
  toast.style.opacity = "1";

  setTimeout(() => {

    toast.style.opacity = "0";

    setTimeout(() => {

      toast.style.visibility = "hidden";

    }, 500);

  }, 3000);

}

</script>

</body>
</html>
